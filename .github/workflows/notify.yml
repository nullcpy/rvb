name: Notify

on:
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [opened, closed, reopened]
  workflow_call:
    inputs:
      workflow_name:
        required: false
        type: string

concurrency:
  group: notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Send Notification to Telegram
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: "@rvb27"
          TG_THREAD_ID: "3031"
        run: |
          set -euo pipefail

          # Escape special HTML characters in dynamic/user-generated content
          esc() { printf '%s' "$1" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/"/\&quot;/g'; }

          EVENT_NAME="${{ github.event_name }}"
          ACTOR="${{ github.actor }}"
          ACTOR_URL="https://github.com/${ACTOR}"
          REPO="${{ github.repository }}"
          REPO_NAME="${REPO#*/}"
          REPO_URL="https://github.com/${REPO}"
          ACTION="${{ github.event.action }}"
          ACTION_CAP="${ACTION^}"
          NL=$'\n'

          WF_NAME="${{ inputs.workflow_name }}"

          if [ -n "$WF_NAME" ]; then
            WF_URL="${GITHUB_SERVER_URL}/${REPO}/actions/runs/${GITHUB_RUN_ID}"
            RUN_NUM="${GITHUB_RUN_NUMBER}"
            BRANCH="$(esc "${{ github.ref_name }}")"
            ACTOR_ESC="$(esc "${ACTOR}")"

            MSG="🔴  <b>Build Failure</b>  |  <b>${REPO_NAME}</b>${NL}"
            MSG+="${NL}"
            MSG+="📋  <b>Workflow:</b>  <a href=\"${WF_URL}\">$(esc "${WF_NAME}") #${RUN_NUM}</a>${NL}"
            MSG+="🌿  <b>Branch:</b>  <code>${BRANCH}</code>${NL}"
            MSG+="👤  <a href=\"${ACTOR_URL}\">${ACTOR_ESC}</a>"

          elif [ "$EVENT_NAME" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            PR_URL="${{ github.event.pull_request.html_url }}"
            TITLE="$(esc "${{ github.event.pull_request.title }}")"
            COMMITS="${{ github.event.pull_request.commits }}"
            FILES="${{ github.event.pull_request.changed_files }}"
            ADD="${{ github.event.pull_request.additions }}"
            DEL="${{ github.event.pull_request.deletions }}"
            BASE="$(esc "${{ github.event.pull_request.base.ref }}")"
            HEAD="$(esc "${{ github.event.pull_request.head.ref }}")"
            ACTOR_ESC="$(esc "${ACTOR}")"

            if [ "$ACTION" = "opened" ]; then PR_ICON="🟢"; elif [ "$ACTION" = "closed" ]; then PR_ICON="🔴"; else PR_ICON="🟡"; fi
            COMMIT_STR="commits"; if [ "$COMMITS" = "1" ]; then COMMIT_STR="commit"; fi

            MSG="${PR_ICON}  <b>Pull Request ${ACTION_CAP}</b>  |  <b>${REPO_NAME}</b>${NL}"
            MSG+="${NL}"
            MSG+="📌  <b><a href=\"${PR_URL}\">#${PR_NUM} — ${TITLE}</a></b>${NL}"
            MSG+="🔀  <code>${HEAD}</code> → <code>${BASE}</code>${NL}"
            MSG+="📦  <b>${COMMITS} ${COMMIT_STR}</b>  ·  ${FILES} files changed  ·  +${ADD} / -${DEL}${NL}"
            MSG+="👤  <a href=\"${ACTOR_URL}\">${ACTOR_ESC}</a>"

          else
            ISSUE_NUM="${{ github.event.issue.number }}"
            ISSUE_URL="${{ github.event.issue.html_url }}"
            TITLE="$(esc "${{ github.event.issue.title }}")"
            ACTOR_ESC="$(esc "${ACTOR}")"

            if [ "$ACTION" = "closed" ]; then ISSUE_ICON="✅"; STATUS="Closed"; elif [ "$ACTION" = "reopened" ]; then ISSUE_ICON="🔄"; STATUS="Reopened"; else ISSUE_ICON="🐛"; STATUS="Opened"; fi

            MSG="${ISSUE_ICON}  <b>Issue ${STATUS}</b>  |  <b>${REPO_NAME}</b>${NL}"
            MSG+="${NL}"
            MSG+="📌  <b><a href=\"${ISSUE_URL}\">#${ISSUE_NUM} — ${TITLE}</a></b>${NL}"
            MSG+="👤  <a href=\"${ACTOR_URL}\">${ACTOR_ESC}</a>"
          fi

          curl -s -X POST \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "message_thread_id=${TG_THREAD_ID}" \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage"
