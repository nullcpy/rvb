name: Deploy Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: [build]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            let md = fs.readFileSync('README.md', 'utf8');

            // Fix relative GitHub links to absolute URLs
            const repoUrl = `https://github.com/${process.env.GITHUB_REPOSITORY}`;
            md = md.replace(/\.\.\/\.\.\/releases\//g, `${repoUrl}/releases/`);
            md = md.replace(/\]\(\.\//g, `](${repoUrl}/blob/${process.env.GITHUB_REF_NAME}/`);
            md = md.replace(/\[Group\]\(https:\/\/t.me\/rvb27\)/g, '[Group](https://t.me/rvb27)');
            md = md.replace(/\[Channel\]\(https:\/\/t.me\/s\/rvb28\)/g, '[Channel](https://t.me/s/rvb28)');

            // Render markdown
            const { data: body } = await github.rest.markdown.render({
              text: md,
              mode: 'gfm',
              context: process.env.GITHUB_REPOSITORY
            });

            // Complete HTML with GitHub markdown CSS
            const html = `<!DOCTYPE html>
            <html lang="en">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>ReVanced & Morphe Builder - Downloads</title>
              <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
              <style>
                body { margin: 0; padding: 0; background: #0d1117; }
                .markdown-body { 
                  box-sizing: border-box; 
                  min-width: 200px; 
                  max-width: 980px; 
                  margin: 0 auto; 
                  padding: 45px;
                  background: #0d1117;
                  color: #c9d1d9;
                }
                .markdown-body a { color: #58a6ff; }
                .markdown-body img { max-width: 100%; height: auto; }
                @media (max-width: 767px) { 
                  .markdown-body { padding: 15px; } 
                }
              </style>
            </head>
            <body>
              <article class="markdown-body">
                ${body}
              </article>
            </body>
            </html>`;

            fs.mkdirSync('public', { recursive: true });
            fs.writeFileSync('public/index.html', html, 'utf8');

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4